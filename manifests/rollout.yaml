apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/stavarlaurentiu/go-simple-webserver@sha256:sha256:9bcf9691d5e120653cae51967c16094e59f3209032cf9fda270b40749a84c246
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
